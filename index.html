<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário de Adoção</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Formulário de adoção</h2>

<main>
  <form id="formAdocao">

    <label>Nome:</label>
    <input type="text" id="nome" placeholder="Nome">
     <br>
    <label>Email:</label>
    <input type="email" id="email" placeholder="ex@exemplo.com">
 <br>
    <label>Telefone:</label>
    <input type="text" id="telefone" placeholder="47999999999">
 <br>
    <label>sangue:</label>
    <select id="sangue">
      <option value="A+">A+</option>
      <option value="A-">A-</option>
      <option value="B+">B-</option>
      <option value="AB+">AB+</option>
      <option value="AB-">AB-</option>
      <option value="O+">O+</option>
      <option value="O-">O-</option>
    </select>
 <br>
    <label>Idade:</label>
    <input type="number" id="idade">
 <br>
    <label>Cidade:</label>
    <input type="text" id="cidade">
 <br>
    <label>estado:</label>
    <input type="text" id="estado" placeholder="escreva seu estado">
 <br>
    
    <button type="submit">Enviar</button>

  </form>
</main>

<h3 id="resultado"></h3>

<script src="script.js"></script>
</body>
</html>
